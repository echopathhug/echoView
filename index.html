<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 게시판 - Family Board</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nanum+Gothic:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 홈 화면 (랜딩 페이지) -->
        <div id="home-screen" class="auth-container fade-in hidden">
            <div class="glass-card" style="max-width: 600px; text-align: center;">
                <h1 style="font-size: 48px; margin-bottom: 16px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Family Board</h1>
                <p style="font-size: 18px; color: var(--text-muted); margin-bottom: 32px;">우리 가족만의 소중한 기록과 추억을 공유하는 공간입니다.</p>
                <div style="margin-bottom: 40px;">
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
                <button id="btn-go-to-login" class="btn btn-primary" style="max-width: 200px; margin: 0 auto;">로그인하기</button>
            </div>
        </div>

        <!-- 로그인 화면 -->
        <div id="login-screen" class="auth-container fade-in hidden">
            <div class="glass-card">
                <h2>Family Board</h2>
                <div class="form-group">
                    <label for="login-username">아이디</label>
                    <input type="text" id="login-username" class="input-field" placeholder="아이디를 입력하세요">
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" class="input-field" placeholder="비밀번호를 입력하세요">
                </div>
                <button id="btn-login" class="btn btn-primary">로그인</button>
                <div id="login-message" class="message error"></div>
            </div>
        </div>

        <!-- 비밀번호 변경 화면 (최초 로그인) -->
        <div id="change-pw-screen" class="auth-container fade-in hidden">
            <div class="glass-card">
                <h2>비밀번호 변경</h2>
                <p style="text-align: center; margin-bottom: 20px; font-size: 14px; color: var(--text-muted);">
                    초기 비밀번호를 사용 중입니다.<br>새로운 비밀번호로 변경해주세요.
                </p>
                <div class="form-group">
                    <label for="new-password">새 비밀번호</label>
                    <input type="password" id="new-password" class="input-field" placeholder="새 비밀번호 입력">
                </div>
                <div class="form-group">
                    <label for="confirm-password">비밀번호 확인</label>
                    <input type="password" id="confirm-password" class="input-field" placeholder="비밀번호 재입력">
                </div>
                <button id="btn-change-pw" class="btn btn-primary">변경 및 로그인</button>
                <div id="change-pw-message" class="message error"></div>
            </div>
        </div>

        <!-- 메인 화면 -->
        <div id="main-screen" class="main-layout hidden">
            <!-- 사이드바 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h1 class="sidebar-title">Family Board</h1>
                </div>
                
                <div id="folder-list" class="folder-list">
                    <!-- 폴더 목록 동적 생성 -->
                </div>

                <div style="margin-top: auto; padding-top: 20px;">
                    <button id="btn-add-folder" class="btn btn-secondary" style="margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        폴더 추가
                    </button>
                    <button id="btn-config" class="btn btn-secondary" style="margin-bottom: 12px;">환경 설정</button>
                    <button id="btn-user-mgmt" class="btn btn-secondary" style="margin-bottom: 12px;">계정 관리</button>
                    <button id="btn-logout" class="btn btn-secondary" style="background: rgba(239, 68, 68, 0.1); color: var(--danger);">로그아웃</button>
                </div>
            </aside>

            <!-- 콘텐츠 영역 -->
            <main class="content-area">
                <header class="content-header">
                    <h2 id="current-folder-title">폴더를 선택하세요</h2>
                    <div class="user-info">
                        <span id="display-username">사용자</span>
                        <div class="user-avatar" id="user-avatar-initial">U</div>
                    </div>
                </header>

                <div id="folder-content" class="hidden">
                    <!-- 글쓰기 에디터 -->
                    <div class="post-editor fade-in">
                        <textarea id="post-input" class="editor-textarea" placeholder="가족과 나누고 싶은 이야기를 적어보세요..."></textarea>
                        <div id="image-previews" class="image-preview-container"></div>
                        <div class="editor-actions">
                            <div class="editor-tools">
                                <label class="icon-btn" title="사진 첨부" style="cursor: pointer;">
                                    <input type="file" id="image-upload" accept="image/*" multiple style="display: none;">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                </label>
                                <button id="btn-add-hashtag" class="icon-btn" title="해시태그">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>
                                </button>
                                <button id="btn-add-link" class="icon-btn" title="다른 글 링크">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                </button>
                            </div>
                            <button id="btn-save-post" class="btn btn-primary" style="width: auto; padding: 10px 24px;">저장하기</button>
                        </div>
                    </div>

                    <!-- 게시글 목록 -->
                    <div id="post-list" class="post-list">
                        <!-- 게시글 동적 생성 -->
                    </div>
                </div>
            </main>
        </div>

        <!-- 모달: 계정 관리 -->
        <div id="user-mgmt-modal" class="modal-overlay hidden">
            <div class="glass-card modal-content fade-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 style="font-size: 20px;">계정 관리</h3>
                    <button class="icon-btn btn-close-modal">&times;</button>
                </div>
                
                <div id="admin-only-section">
                    <div style="margin-bottom: 20px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px;">
                        <h4 style="font-size: 14px; margin-bottom: 12px; color: var(--text-muted);">새 계정 생성</h4>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="new-user-id" class="input-field" placeholder="새 아이디" style="padding: 8px 12px;">
                            <button id="btn-create-user" class="btn btn-primary" style="width: auto; padding: 8px 16px; font-size: 14px;">추가</button>
                        </div>
                    </div>

                    <h4 style="font-size: 14px; margin-bottom: 12px; color: var(--text-muted);">사용자 목록</h4>
                    <div id="user-table" style="max-height: 200px; overflow-y: auto;">
                        <!-- 사용자 목록 동적 생성 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 모달: 글 링크 입력 -->
        <div id="link-modal" class="modal-overlay hidden">
            <div class="glass-card modal-content fade-in">
                <h3 style="margin-bottom: 20px;">다른 글 링크하기</h3>
                <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 12px;">링크할 게시글의 ID 숫자만 입력하세요.</p>
                <div class="form-group">
                    <input type="number" id="link-post-id-input" class="input-field" placeholder="예: 1714652000000">
                </div>
                <div style="display: flex; gap: 12px;">
                    <button id="btn-confirm-link" class="btn btn-primary">링크 삽입</button>
                    <button class="btn btn-secondary btn-close-modal">취소</button>
                </div>
            </div>
        </div>

        <!-- 모달: 환경 설정 -->
        <div id="config-modal" class="modal-overlay hidden">
            <div class="glass-card modal-content fade-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 style="font-size: 20px;">환경 설정</h3>
                    <button class="icon-btn btn-close-modal">&times;</button>
                </div>
                
                <div class="form-group">
                    <label>전체 폰트 변경</label>
                    <select id="font-select" class="input-field" style="background: rgba(15, 23, 42, 0.8); cursor: pointer;">
                        <option value="'Inter', sans-serif">기본 (Inter)</option>
                        <option value="'Noto Sans KR', sans-serif">본고딕 (Noto Sans KR)</option>
                        <option value="'Nanum Gothic', sans-serif">나눔고딕 (Nanum Gothic)</option>
                        <option value="'Gowun Batang', serif">고운바탕 (Gowun Batang)</option>
                    </select>
                </div>
                
                <div style="margin-top: 24px;">
                    <button id="btn-save-config" class="btn btn-primary">설정 저장</button>
                </div>
            </div>
        </div>

        <!-- 모달: 폴더 이름 변경 -->
        <div id="folder-modal" class="modal-overlay hidden">
            <div class="glass-card modal-content fade-in">
                <h3 id="folder-modal-title" style="margin-bottom: 20px;">폴더 관리</h3>
                <div class="form-group">
                    <input type="text" id="folder-name-input" class="input-field" placeholder="폴더 이름을 입력하세요">
                </div>
                <div style="display: flex; gap: 12px;">
                    <button id="btn-confirm-folder" class="btn btn-primary">확인</button>
                    <button class="btn btn-secondary btn-close-modal">취소</button>
                </div>
            </div>
        </div>

        <!-- 모달: 게시글 수정 -->
        <div id="edit-post-modal" class="modal-overlay hidden">
            <div class="glass-card modal-content fade-in">
                <h3 style="margin-bottom: 20px;">게시글 수정</h3>
                <div class="form-group">
                    <label>내용</label>
                    <textarea id="edit-post-input" class="input-field" style="min-height: 150px; resize: vertical;"></textarea>
                </div>
                <div class="form-group">
                    <label>폴더 이동</label>
                    <select id="edit-post-folder-select" class="input-field" style="background: rgba(15, 23, 42, 0.8); cursor: pointer;">
                        <!-- 폴더 목록 동적 생성 -->
                    </select>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button id="btn-save-edit-post" class="btn btn-primary">수정 완료</button>
                    <button class="btn btn-secondary btn-close-modal">취소</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="storage.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
